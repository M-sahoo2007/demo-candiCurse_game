version: '3.9'
services:
  web:
    build: .
    command: gunicorn candyverse.wsgi:application --bind 0.0.0.0:8000
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: candyverse
      POSTGRES_USER: candyverse
      POSTGRES_PASSWORD: candyversepass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data/
volumes:
  postgres_data:
  static_volume:
  media_volume:
